name: Deploy Storybook

# Republish the Storybook UI-library preview when a merge to main touches
# something the build depends on. Served at
# https://tasandberg.github.io/osc-character-sheet/storybook/.
# Not a required check, so a plain paths filter is safe — a docs-only push just
# skips the redeploy.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".storybook/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-storybook.yml"

# peaceiris/actions-gh-pages pushes to the gh-pages branch via GITHUB_TOKEN.
permissions:
  contents: write

# Never let two deploys race the gh-pages branch.
concurrency:
  group: deploy-storybook
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Storybook static output uses relative asset paths, so it serves fine
      # from the /osc-character-sheet/storybook/ subfolder without a base flag.
      - run: pnpm storybook:build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          destination_dir: storybook
          keep_files: true # preserve the rest of the gh-pages branch
